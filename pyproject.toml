[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mnemon-memory"
version = "0.2.0"
description = "Universal long-term memory layer for AI agents via MCP"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Brian McMahon", email = "cipher813@gmail.com" },
]
urls.Homepage = "https://github.com/cipher813/mnemon"
urls.Repository = "https://github.com/cipher813/mnemon"
urls.Issues = "https://github.com/cipher813/mnemon/issues"
urls.Changelog = "https://github.com/cipher813/mnemon/blob/main/CHANGELOG.md"
keywords = ["mcp", "memory", "ai", "agents", "llm", "sqlite", "vector-search"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Intended Audience :: Developers",
]
dependencies = [
    "mcp>=1.27",
    "numpy>=1.24",
    "fastembed>=0.3",
]

[project.optional-dependencies]
llm = [
    "llama-cpp-python>=0.3",
    "huggingface-hub>=0.20",
]
ui = [
    "streamlit>=1.30",
    "plotly>=5.18",
    "umap-learn>=0.5",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "httpx>=0.27",
]
all = [
    "mnemon-memory[llm,dev,ui]",
]

[project.scripts]
mnemon = "mnemon.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/mnemon"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
