name: Deploy to Fly

# Deploys mnemon to its Fly app. NOT a replacement for the manual path:
# `mnemon upgrade web` (and a plain `flyctl deploy`) remain the supported,
# fully-capable way to deploy for self-hosting and for testing; see the
# "Self-host on Fly.io" section of README.md.
#
# Triggers:
#   - push to main  → AUTO-DEPLOY every merge (the owner wants zero clicks),
#                     but ONLY on the canonical (non-fork) repo, so a fork's
#                     CI is never touched by a push.
#   - workflow_dispatch → manual one-click, available to anyone (incl. forks)
#                     who has wired their own app + token.
#
# Keyed entirely to the OWNER's deployment — nothing hardcoded:
#   - target app from the `FLY_APP` repo variable (or the dispatch `app`
#     input), so a fork points it at its own app;
#   - authenticates with the `FLY_API_TOKEN` repo secret.
# A fork without those can still dispatch it, and the steps fail loud if the
# app/token aren't wired. The job is guarded so push-triggered runs skip
# cleanly on forks (no red CI).
#
# Safe to run on every release: a redeploy preserves the Fly volume (vault
# data) and existing Fly secrets — including the OAuth AS passphrase, which
# is never rotated (the 0.7.3 fail-closed guard). It is a pure image swap,
# the same as `mnemon upgrade web`'s redeploy path. The post-deploy /health
# gate fails the run (red main) if a release comes up unhealthy.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      app:
        description: "Fly app name (overrides the FLY_APP repo variable)"
        required: false
        type: string

concurrency:
  # Serialize deploys; let an in-flight deploy finish rather than cancel it
  # mid-`flyctl deploy`. Back-to-back merges queue and each rolls out.
  group: fly-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Auto-deploy on push only on the canonical repo; a fork's pushes skip
    # (so forks get no red CI). Manual dispatch is always allowed — that's
    # how a fork deploys its own app.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.repository.fork == false }}
    steps:
      - uses: actions/checkout@v7

      - name: Resolve app name + require token
        id: cfg
        env:
          INPUT_APP: ${{ inputs.app }}
          VAR_APP: ${{ vars.FLY_APP }}
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          APP="${INPUT_APP:-$VAR_APP}"
          if [ -z "$APP" ]; then
            echo "::error::No Fly app name. Set the FLY_APP repo variable or pass the 'app' input. (Manual 'mnemon upgrade web' remains available — see README.)"
            exit 1
          fi
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::error::FLY_API_TOKEN secret is not set. Wire it in repo settings to enable CI deploys; the manual path needs no secret."
            exit 1
          fi
          echo "app=$APP" >> "$GITHUB_OUTPUT"

      - name: Render fly.toml from the committed template
        env:
          APP: ${{ steps.cfg.outputs.app }}
        run: |
          # fly.toml is .gitignored (per-deploy); render it from the
          # vendor-neutral fly.toml.example by filling in the app name.
          sed "s/REPLACE_ME_fly_app_name/${APP}/g" fly.toml.example > fly.toml
          echo "--- rendered fly.toml ---"
          cat fly.toml

      - name: Install flyctl (retried)
        # Replaces `superfly/flyctl-actions/setup-flyctl@master`: that action
        # downloads the flyctl binary from a GitHub/Fly CDN, which 503'd on a
        # transient hiccup 2026-06-15 — and a `uses:` step can't be retried.
        # Installing via the official script in a retry loop hardens that
        # transient-download failure mode (companion to the deploy retry
        # below). A genuine failure still exhausts the attempts and reds.
        run: |
          set +e
          for i in 1 2 3; do
            curl -fsSL https://fly.io/install.sh | sh && break
            echo "flyctl install attempt $i failed; retrying in $((i * 10))s..."
            sleep $((i * 10))
          done
          if [ ! -x "$HOME/.fly/bin/flyctl" ]; then
            echo "::error::flyctl install failed after 3 attempts."
            exit 1
          fi
          echo "$HOME/.fly/bin" >> "$GITHUB_PATH"
          "$HOME/.fly/bin/flyctl" version

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          APP: ${{ steps.cfg.outputs.app }}
        # --remote-only builds on Fly's builders (no Docker-in-CI). The
        # deploy attaches to the existing volume + secrets; it does not
        # set or rotate them.
        #
        # Retry with backoff: `flyctl deploy` occasionally fails on a
        # transient Fly-side hiccup — e.g. a token-verify timeout
        # ("token validation error: ... context deadline exceeded", seen
        # on the first auto-deploy 2026-06-15) — unrelated to the image or
        # config. The deploy is idempotent (reconciles the app to the
        # target image), so retrying is safe; a genuine failure (bad token,
        # broken build) just exhausts the attempts and reds the run, as it
        # should. Without this, a flaky Fly timeout reds `main` on an
        # otherwise-good merge.
        run: |
          set +e
          attempts=3
          for i in $(seq 1 "$attempts"); do
            echo "::group::flyctl deploy (attempt $i/$attempts)"
            flyctl deploy --config fly.toml --app "$APP" --remote-only
            code=$?
            echo "::endgroup::"
            if [ "$code" -eq 0 ]; then
              exit 0
            fi
            echo "deploy attempt $i failed (exit $code)"
            if [ "$i" -lt "$attempts" ]; then
              backoff=$((i * 20))
              echo "retrying in ${backoff}s..."
              sleep "$backoff"
            fi
          done
          echo "::error::flyctl deploy failed after ${attempts} attempts."
          exit 1

      - name: Post-deploy health gate
        env:
          APP: ${{ steps.cfg.outputs.app }}
        # Fail the run unless /health reports status=ok after the deploy,
        # so a broken release surfaces here instead of silently going live.
        # Generous retries cover the first-request FastEmbed model load.
        run: |
          URL="https://${APP}.fly.dev/health"
          for i in $(seq 1 18); do
            STATUS=$(curl -sf --max-time 35 -H "User-Agent: mnemon-ci-deploy/1" "$URL" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || true)
            if [ "$STATUS" = "ok" ]; then
              echo "/health reported status=ok after deploy."
              exit 0
            fi
            echo "waiting for /health (attempt $i/18)..."
            sleep 10
          done
          echo "::error::/health did not report status=ok within the timeout after deploy."
          exit 1
