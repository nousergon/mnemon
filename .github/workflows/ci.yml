name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    # Backstop against a hung test (e.g. a stalled cold model download)
    # stalling on the 6h default.
    timeout-minutes: 20
    env:
      # Pin the embedder (FastEmbed) + NLI (HF) model caches to a path we
      # restore via actions/cache below, so tests don't cold-download
      # ~100MB on every run — the source of an intermittent CI hang.
      FASTEMBED_CACHE_DIR: ${{ github.workspace }}/.model-cache/fastembed
      HF_HOME: ${{ github.workspace }}/.model-cache/hf
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.12", "3.13"]
        # macOS is the primary dev platform — validate it on one Python
        # version to catch Mac-specific regressions without a full
        # cross-product of CI minutes. Windows is scoped out: mnemon's
        # runtime + deploy paths are unix-only (flyctl, ~/.mnemon paths,
        # 0600 file perms).
        include:
          - os: macos-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@v4

      - name: Cache embedder + NLI models
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.model-cache
          key: mnemon-models-${{ runner.os }}-v1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage gate
        # Enforces the project's coverage floor (88%) per pyproject.toml
        # [tool.coverage.report] fail_under. Build fails if a PR drops
        # coverage below the gate. Configuration (source paths, omits,
        # exclude_lines) lives in pyproject.toml so this stays a one-line
        # invocation. --timeout is a per-test backstop: a stalled cold
        # model download fails that test fast instead of hanging the job.
        run: pytest tests/ -v --cov --cov-report=term-missing --timeout=300 --timeout-method=thread

  secrets:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # gitleaks-action@v2 requires a paid GITLEAKS_LICENSE for GitHub *org*
      # repos (free only for user repos). The cipher813 -> nousergon org
      # transfer broke this check, so use the free raw gitleaks binary instead
      # — same scan engine, no license. (see nousergon/mnemon#258)
      - name: Install gitleaks
        run: |
          VERSION=8.30.1
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan git history for secrets
        run: gitleaks detect --source . --redact --no-banner --verbose
