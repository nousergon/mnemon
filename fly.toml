app = "mnemon-memory"
primary_region = "sjc"

[build]

[env]
  PORT = "8080"
  MNEMON_VAULT_DIR = "/data"
  MNEMON_PUBLIC_URL = "https://mnemon-memory.fly.dev"
  MNEMON_OAUTH_AUDIENCE = "https://mnemon-memory.fly.dev/mcp"
  MNEMON_ALLOWED_HOSTS = "mnemon-memory.fly.dev"
  # MNEMON_OAUTH_ISSUER, MNEMON_OAUTH_JWKS_URL, and MNEMON_OAUTH_USERINFO_URL
  # are set via `fly secrets set`

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  # First request after a cold start loads the FastEmbed bge-small-en-v1.5
  # ONNX model (~15–25s). grace_period must be longer than that to avoid
  # false-positive "app not listening on 0.0.0.0:8080" warnings during
  # rolling deploys and `fly secrets set` restarts.
  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "40s"
    method = "GET"
    path = "/health"

[mounts]
  source = "mnemon_data"
  destination = "/data"

# Memory must be at least 1GB because the first memory_search call loads
# the FastEmbed bge-small-en-v1.5 ONNX model (~130MB resident) into RAM
# on top of Python, uvicorn, FastMCP, and the vector store. The Fly
# default (shared-cpu-1x:256mb) OOM-kills the mnemon process on first
# search — confirmed during work item 4 smoke testing 2026-04-11.
[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
