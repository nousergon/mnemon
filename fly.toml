app = "mnemon"
primary_region = "sea"

[build]

[env]
  PORT = "8080"
  MNEMON_VAULT_DIR = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "mnemon_data"
  destination = "/data"
